version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - durationcheck
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    gocritic:
      disabled-checks:
        - captLocal # Meeus convention: T (century), M (anomaly), J (day), etc.
