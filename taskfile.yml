version: "3"

tasks:
  default:
    desc: Run all checks
    aliases: [check]
    cmds:
      - task: fmt:check
      - task: vet
      - task: lint:check
      - task: test

  all:
    desc: Run all checks, coverage, benchmarks, and fuzz tests
    cmds:
      - task: fmt:check
      - task: vet
      - task: lint:check
      - task: test
      - task: cover
      - task: bench
      - task: fuzz

  fix:
    desc: Run all fixes
    cmds:
      - task: fmt:fix
      - task: lint:fix

  fmt:check:
    desc: Check formatting with gofumpt -extra
    cmds:
      - |
        output="$(gofumpt -extra -l .)"
        if [ -n "$output" ]; then
          echo "$output"
          echo "gofumpt formatting check failed: run 'task fmt:fix' to fix." >&2
          exit 1
        fi

  fmt:fix:
    desc: Fix formatting with gofumpt -extra
    cmds:
      - gofumpt -extra -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:check:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  test:
    desc: Run all tests
    cmds:
      - go test -race -count=1 ./...

  cover:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | tail -1
      - rm coverage.out

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  fuzz:
    desc: Run all fuzz tests (10s each)
    cmds:
      - go test -fuzz=FuzzSunriseSunset -fuzztime=10s ./...
      - go test -fuzz=FuzzLunarPhase -fuzztime=10s ./...
      - go test -fuzz=FuzzMoonriseMoonset -fuzztime=10s ./...
